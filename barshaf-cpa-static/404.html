<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>הדף לא נמצא (404) | ברשף רואי חשבון</title>
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="canonical" href="https://barshaf-cpa.com/">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'almoni-dl-aaa-300';
      src: url('https://static.parastorage.com/fonts/v2/5b763edb-ddf0-42b5-bdb6-ad597cac5246/v1/almoni-dl-aaa-300.woff2') format('woff2');
      font-weight: 300; font-display: swap;
    }
    @font-face {
      font-family: 'almoni-dl-aaa-400';
      src: url('https://static.parastorage.com/fonts/v2/76d80fe4-b79d-4bef-a3db-00137d89108f/v1/almoni-dl-aaa-400.woff2') format('woff2');
      font-weight: 400; font-display: swap;
    }
    @font-face {
      font-family: 'almoni-dl-aaa-700';
      src: url('https://static.parastorage.com/fonts/v2/70866fe5-6b83-4766-9492-72b6a07a286c/v1/almoni-dl-aaa-700.woff2') format('woff2');
      font-weight: 400; font-display: swap;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root { --gold: #BF9B30; --dark: #1B1B1E; }

    html { scroll-behavior: smooth; }
    body {
      direction: rtl;
      background-color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }

    .logo {
      width: 320px;
      max-width: 78vw;
      margin-bottom: 28px;
    }

    .rule {
      width: 51px;
      height: 0;
      border-top: 8px solid var(--gold);
      margin: 0 auto 28px;
    }

    .code {
      font-family: 'almoni-dl-aaa-700', sans-serif;
      font-size: 96px;
      font-weight: 400;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 14px;
    }

    .heading {
      font-family: 'almoni-dl-aaa-400', sans-serif;
      font-size: 34px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 16px;
    }

    .text {
      font-family: 'almoni-dl-aaa-300', sans-serif;
      font-size: 19px;
      color: rgba(255,255,255,0.75);
      line-height: 1.7;
      max-width: 520px;
      margin-bottom: 36px;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
    }

    .btn {
      font-family: 'almoni-dl-aaa-400', sans-serif;
      font-size: 19px;
      text-decoration: none;
      padding: 15px 38px;
      transition: opacity 0.2s, background 0.2s, color 0.2s;
    }

    .btn-primary { background: var(--gold); color: #000; }
    .btn-primary:hover { opacity: 0.88; }

    .btn-secondary {
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.4);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.08); }

    .home-link { text-decoration: none; }

    @media (max-width: 480px) {
      .code { font-size: 68px; }
      .heading { font-size: 26px; }
      .text { font-size: 16px; }
      .btn { font-size: 17px; padding: 14px 26px; width: 100%; }
      .links { width: 100%; }
    }
  </style>
</head>
<body>

  <a href="/" class="home-link" aria-label="חזרה לעמוד הבית — ברשף רואי חשבון">
    <img class="logo" src="/logo.png" alt="ברשף רואי חשבון ראשון לציון">
  </a>

  <div class="rule"></div>

  <div class="code">404</div>
  <h1 class="heading">הדף שחיפשת לא נמצא</h1>
  <p class="text">
    ייתכן שהכתובת שגויה או שהעמוד הוסר. אפשר לחזור לעמוד הבית או לבדוק כמה מגיע לך בהחזר מס — בחינם וללא הרשמה.
  </p>

  <nav class="links">
    <a class="btn btn-primary" href="/">חזרה לעמוד הבית</a>
    <a class="btn btn-secondary" href="https://simulator.barshaf-cpa.com/">סימולטור החזר מס</a>
  </nav>

</body>
</html>
